<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《三角洲行动》地图工具</title>
  <meta name="description" content="本网页提供《三角洲行动》游戏中零号大坝地图的分层、快速定位、物资点、撤离点等信息。您可以查看地图上的各种物品、服务器、首领等位置，以及开启地图随机事件的功能。">
  <meta name="keywords" content="三角洲行动,Delta Force,地图工具,零号大坝,长弓溪谷,航天基地,巴克什,潮汐监狱,烽火地带,撤离点,物资点,保险箱,互动地图">
  <meta name="author" content="DFM Map Tool">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="/">
  <!-- Open Graph (社交分享) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="《三角洲行动》地图工具">
  <meta property="og:description" content="三角洲行动烽火地带互动地图，实时查看物资点、撤离点、保险箱等位置信息。">
  <meta property="og:url" content="/">
  <meta property="og:site_name" content="三角洲行动地图工具">
  <meta property="og:image" content="https://game.gtimg.cn/images/dfm/cp/a20240729directory/img/lv3/dtcld.png">
  <meta property="og:image:width" content="256">
  <meta property="og:image:height" content="256">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="《三角洲行动》地图工具">
  <meta name="twitter:description" content="三角洲行动烽火地带互动地图，实时查看物资点、撤离点、保险箱等位置信息。">
  <meta name="twitter:image" content="https://game.gtimg.cn/images/dfm/cp/a20240729directory/img/lv3/dtcld.png">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://game.gtimg.cn/images/dfm/cp/a20240729directory/leaflet.css">
  <link rel="stylesheet" href="styles.css?v=1774442965">
</head>
<body>

<!-- 入口页面（无 key 时显示） -->
<div class="landing-overlay" id="landingOverlay">
  <div class="landing-card">
    <h1 class="landing-title">三角洲行动 · 地图工具</h1>
    <p class="landing-desc">输入房间号，连接数据源</p>
    <div class="landing-input-wrap">
      <input type="text" class="landing-input" id="landingKey" placeholder="请输入房间号" autocomplete="off" spellcheck="false">
      <button class="landing-btn" id="landingBtn" onclick="goRadar()">进入</button>
    </div>
    <p class="landing-hint">房间号由分享者提供</p>
    <p class="landing-error" id="landingError" style="display:none;color:#ff4d4f;margin-top:8px;font-size:14px;"></p>
  </div>
</div>

<!-- Full-screen map -->
<div id="map"></div>

<!-- Floating top bar -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-mark"><img src="https://ts2.tc.mm.bing.net/th/id/OADD2.1236950586074667_10E952XP1L5EA4O?w=32&h=32&o=6&pid=21.2" alt="logo"></div>
    三角洲地图工具
  </div>
  <div class="topbar-sep"></div>
  <div class="map-tabs" id="mapTabs">
    <div class="map-tab active" id="tab-daba" onclick="switchMap('daba')">零号大坝</div>
    <div class="map-tab" id="tab-cgxg" onclick="switchMap('cgxg')">长弓溪谷</div>
    <div class="map-tab" id="tab-htjd" onclick="switchMap('htjd')">航天基地</div>
    <div class="map-tab" id="tab-bks" onclick="switchMap('bks')">巴克什</div>
    <div class="map-tab" id="tab-cxjy" onclick="switchMap('cxjy')">潮汐监狱</div>
  </div>
  <div class="topbar-sep"></div>
  <button class="topbar-pill active" id="btnRegion" onclick="toggleRegions()" style="margin-left:auto">地名</button>
  <button class="topbar-pill" id="btnFullscreen" onclick="toggleFullscreen()" title="全屏">⛶</button>
  <div class="topbar-pill" style="cursor:default">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">未连接</span>
  </div>
</div>

<!-- 浮动队伍面板（左下角，跟随模式时显示） -->
<div class="team-float" id="spectateFloat">
  <div id="sfBtnList"></div>
</div>

<!-- 浮动当局统计（收缩侧边栏时左上角显示） -->
<div class="float-stats" id="floatStats">
  <div class="fs-title">当局统计</div>
  <div class="fs-row"><span class="fs-dot" style="background:#FF453A"></span><span class="fs-val" id="fsP">0</span><span class="fs-lbl">玩家</span></div>
  <div class="fs-row"><span class="fs-dot" style="background:#636366"></span><span class="fs-val" id="fsA">0</span><span class="fs-lbl">人机</span></div>
  <div class="fs-row"><span class="fs-dot" style="background:#FF9F0A"></span><span class="fs-val" id="fsD">0</span><span class="fs-lbl">倒地</span></div>
  <div class="fs-row"><span class="fs-dot" style="background:#30D158"></span><span class="fs-val" id="fsI">0</span><span class="fs-lbl">物品</span></div>
  <div class="fs-row"><span class="fs-dot" style="background:#FF9F0A"></span><span class="fs-val" id="fsC">0</span><span class="fs-lbl">容器</span></div>
  <div class="fs-row"><span class="fs-dot" style="background:#0A84FF"></span><span class="fs-val" id="fsE">0</span><span class="fs-lbl">撤离</span></div>
</div>

<!-- Sidebar collapse toggle -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">‹</button>

<!-- Left sidebar -->
<div class="sidebar">

  <!-- Stats (未进入地图时隐藏) -->
  <div class="panel" id="panelStats" style="display:none">
    <div class="panel-title">当局统计</div>
    <div class="stats-grid">
      <div class="stat-row"><span class="stat-dot" style="background:#FF453A;box-shadow:0 0 6px #FF453A"></span><span class="stat-val" id="stP" style="color:#FF453A">0</span><span class="stat-lbl">玩家/队伍</span></div>
      <div class="stat-row"><span class="stat-dot" style="background:#636366"></span><span class="stat-val" id="stA" style="color:#636366">0</span><span class="stat-lbl">人机</span></div>
      <div class="stat-row"><span class="stat-dot" style="background:#FF9F0A;box-shadow:0 0 6px #FF9F0A"></span><span class="stat-val" id="stD" style="color:#FF9F0A">0</span><span class="stat-lbl">倒地</span></div>
      <div class="stat-row"><span class="stat-dot" style="background:#30D158;box-shadow:0 0 6px #30D158"></span><span class="stat-val" id="stI" style="color:#30D158">0</span><span class="stat-lbl">物品</span></div>
      <div class="stat-row"><span class="stat-dot" style="background:#FF9F0A;box-shadow:0 0 6px #FF9F0A"></span><span class="stat-val" id="stC" style="color:#FF9F0A">0</span><span class="stat-lbl">容器</span></div>
      <div class="stat-row"><span class="stat-dot" style="background:#0A84FF;box-shadow:0 0 6px #0A84FF"></span><span class="stat-val" id="stE" style="color:#0A84FF">0</span><span class="stat-lbl">撤离</span></div>
      <div class="stat-row" style="grid-column:span 2"><span class="stat-dot" style="background:#AC8E68;box-shadow:0 0 6px #AC8E68"></span><span class="stat-val" id="stSize" style="color:#AC8E68">-</span><span class="stat-lbl">数据量</span></div>
    </div>
  </div>

  <!-- Layers -->
  <div class="panel">
    <div class="panel-title">图层</div>
    <div class="layer-grid">
      <div class="layer-row" style="position:relative" onclick="toggleEnemyCfg()"><span class="layer-lbl"><span class="ldot" style="background:#FF453A"></span>敌方信息 ⚙</span><div class="box-cfg-pop" id="enemyCfgPop"><label class="box-chk-row"><input type="checkbox" id="chkEnemyName" checked onchange="onEnemyFilterChange()"><span style="color:#FF453A">名称</span></label><label class="box-chk-row"><input type="checkbox" id="chkEnemyHero" checked onchange="onEnemyFilterChange()"><span style="color:#FF453A">干员</span></label><label class="box-chk-row"><input type="checkbox" id="chkEnemyWeapon" checked onchange="onEnemyFilterChange()"><span style="color:#FF453A">手持</span></label><label class="box-chk-row"><input type="checkbox" id="chkEnemyHelmet" checked onchange="onEnemyFilterChange()"><span style="color:#FF453A">头盔</span></label><label class="box-chk-row"><input type="checkbox" id="chkEnemyArmor" checked onchange="onEnemyFilterChange()"><span style="color:#FF453A">护甲</span></label></div></div>
      <div class="layer-row" style="position:relative" onclick="toggleBoxCfg()"><span class="layer-lbl"><span class="ldot" style="background:#C8A060"></span>盒子筛选 ⚙</span><div class="box-cfg-pop" id="boxCfgPop"><label class="box-chk-row"><input type="checkbox" id="chkPlayerBox" checked onchange="onBoxFilterChange()"><span style="color:#C8A060">玩家盒子</span></label><label class="box-chk-row"><input type="checkbox" id="chkAIBox" onchange="onBoxFilterChange()"><span style="color:#808080">人机盒子</span></label></div></div>
      <div class="layer-row" onclick="toggleLayer('enemy')"><span class="layer-lbl"><span class="ldot" style="background:#FF453A"></span>敌方</span><div class="ltog on" id="ltog-enemy"></div></div>
      <div class="layer-row" onclick="toggleLayer('box')"><span class="layer-lbl"><span class="ldot" style="background:#C8A060"></span>盒子</span><div class="ltog on" id="ltog-box"></div></div>
      <div class="layer-row" onclick="toggleLayer('ai')"><span class="layer-lbl"><span class="ldot" style="background:#636366"></span>人机</span><div class="ltog" id="ltog-ai"></div></div>
      <div class="layer-row" onclick="toggleLayer('container')"><span class="layer-lbl"><span class="ldot" style="background:#FFD60A"></span>容器</span><div class="ltog on" id="ltog-container"></div></div>
      <div class="layer-row" onclick="toggleLayer('item')"><span class="layer-lbl"><span class="ldot" style="background:#BF5AF2"></span>物品</span><div class="ltog on" id="ltog-item"></div></div>
      <div class="layer-row" onclick="toggleLayer('exit')"><span class="layer-lbl"><span class="ldot" style="background:#30D158"></span>撤离</span><div class="ltog on" id="ltog-exit"></div></div>
    </div>
    <div class="scale-row">
      <span class="cfg-lbl">大小</span>
      <input type="range" class="scale-slider" id="markerScale" min="0.5" max="2" step="0.1" value="1.3" oninput="setMarkerScale(this.value)">
      <span class="scale-val" id="scaleVal">1.3</span>
    </div>
    <div class="scale-row">
      <span class="cfg-lbl" style="width:auto">价值</span>
      <input type="range" class="scale-slider" id="itemValueFilter" min="0" max="60000" step="1000" value="0" oninput="setItemValueFilter(this.value)">
      <input type="text" id="itemValDisp" class="scale-val-input" value="0" onchange="onItemValInput(this.value)" onclick="this.select()">
    </div>
    <div class="scale-row">
      <span class="cfg-lbl" style="width:auto">补帧</span>
      <input type="range" class="scale-slider" id="lerpMultiplier" min="2" max="10" step="1" value="3" oninput="setLerpMultiplier(this.value)">
      <span class="scale-val" id="lerpVal">×3</span>
    </div>
  </div>

  <!-- Spectate -->
  <div class="panel">
    <div class="panel-title">观战视角</div>
    <select id="spectateSelect"><option value="self">自身</option></select>
    <button class="btn" id="btnFollow" onclick="toggleFollow()" style="margin-top:6px;width:100%;flex:unset">跟随: 关</button>
    <div class="hint">距离与高度差以此为参考</div>
  </div>

  <!-- Connection (hidden inputs for WS defaults) -->
  <input type="hidden" id="cfgHost" value="localhost"/>
  <input type="hidden" id="cfgPort" value="12345"/>
  <input type="hidden" id="cfgKey" value=""/>
  <div id="wsStatusText" style="display:none"></div>
  <button id="btnPoll" style="display:none"></button>

</div>

<!-- Hidden compat IDs -->
<span id="sbMapName" style="display:none"></span>

<!-- Toast -->
<div id="toast">已复制到剪贴板</div>

<!-- Leaflet JS from official CDN -->
<script src="https://game.gtimg.cn/images/dfm/cp/a20240729directory/js/lib/leaflet.js"></script>
<!-- 模块化 JS（按依赖顺序加载） -->
<script src="js/mapConfig.js?v=1774442965"></script>
<script src="js/ui.js?v=1774442965"></script>
<script src="js/mapEngine.js?v=1774442965"></script>
<script src="js/canvasRenderer.js?v=1774442965"></script>
<script src="js/wsClient.js?v=1774442965"></script>
<script src="js/main.js?v=1774442965"></script>
</body>
</html>
